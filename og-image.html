<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>OG Image Source</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 1200px;
                height: 630px;
                background: #0d0d0f;
                color: #f2f1ee;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI",
                    sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .card {
                text-align: center;
            }
            .wordmark {
                font-weight: 700;
                font-size: 28px;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: #f2f1ee;
            }
            .realname {
                display: block;
                font-weight: 400;
                font-size: 20px;
                color: #918f95;
                margin-top: 6px;
            }
            h1 {
                font-size: 56px;
                font-weight: 700;
                line-height: 1.15;
                margin: 40px 0 0;
                max-width: 900px;
                color: #f2f1ee;
            }
            .accent-bar {
                width: 80px;
                height: 6px;
                background: #d98b62;
                margin: 32px auto 0;
                border-radius: 3px;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="wordmark">
                ACE<span class="realname">Rodney Boachie</span>
            </div>
            <h1>I build systems that don't stress under stress.</h1>
            <div class="accent-bar"></div>
        </div>
    </body>
</html>
